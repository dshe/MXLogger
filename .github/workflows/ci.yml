name: Build, Test, Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish NuGet package?'
        required: false
        default: 'false'

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MinimalContainer.slnx

      - name: Build
        run: dotnet build MinimalContainer.slnx `
          --configuration Release --no-restore

      - name: Test
        run: dotnet test MinimalContainer.slnx `
          --configuration Release --no-build

      - name: Pack
        run: dotnet pack MinimalContainer/MinimalContainer.csproj `
          --configuration Release `
          --no-restore --no-build `
          -o ./artifacts

      - name: List artifacts
        run: ls ./artifacts

      - name: Publish to NuGet
        if: github.event.inputs.publish == 'true'
        run: |
          $pkg = Get-ChildItem ./artifacts/*.nupkg | Select-Object -First 1
          dotnet nuget push $pkg.FullName `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json
